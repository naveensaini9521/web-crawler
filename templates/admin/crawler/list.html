{% extends "admin/layout.html" %}
{% block content %}
<div class="pagetitle">
      <h1>Crawler</h1>
      <nav>
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="/dashboard">Home</a></li>
          <li class="breadcrumb-item">Crawler</li>
          <li class="breadcrumb-item active">List</li>
       </ol>
        <a style="position: absolute;top: 100px;right: 50px;" href="/crawler/create"><button class="btn btn-primary">Create</button></a>
        <a style="position: absolute;top: 100px;right: 150px;" href="/crawler/crawl_instantly_form"><button class="btn btn-success">Crawl Data Instantly</button></a>

      </nav>
    </div><!-- End Page Title -->
    <section class="section">
      <div class="row">
        <div class="col-lg-12">

          <div class="card">
            <div class="card-body">
              <h5 class="card-title">Crawler List</h5>
              <table class="table table-stripped">
                <thead class="thead-dark">
                 <tr>
                    <td>
                  Name
                </td>
                <td>
                  URL
                </td>
                     <td>
                         Crawler Data
                     </td>
                     <td>
                         <p id="lastCrawlTime">Crawled Time: </p>

                     </td>
                 </tr>
                </thead>
                <tbody>
                {% for crawler in data %}
               <tr>
                 <td>{{ crawler.name }}</td>
                  <td style="overflow:scroll;max-width:200px;">{{ crawler.url }}</td>
                   <td><a class="bi bi-bell" href="/crawler/{{ crawler.id}}/data" target="_self"></a> </td>
                   <td id="timestamp">{{ crawler.timestamp }}</td>
               </tr>
              {% endfor %}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </section>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$(document).ready(function() {
    // Assuming you have a function or variable that retrieves the last crawl time
    var lastCrawlTime = getLastCrawlTime(); // Replace with your actual function or variable

    // Update the HTML element with the last crawl time
    $("#lastCrawlTime").text("Last crawled: " + lastCrawlTime);
});
</script>
<script>function getLastCrawlTime() {
    // Replace with your actual logic to fetch the last crawl time
    var lastCrawlTime = new Date(); // Replace with your actual retrieval logic
    return lastCrawlTime.toLocaleString(); // Format as per your requirement
}
</script>

{% endblock %}
