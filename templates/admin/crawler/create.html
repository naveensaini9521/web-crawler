{% extends "admin/layout.html" %}
{% block content %}
     {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="notification is-danger" style="color:red">
                        {{ messages[0] }}
                    </div>
                {% endif %}
    {% endwith %}
<form action="/crawler/create" method="post" enctype="application/x-www-form-urlencoded">
	{% if message is defined and message %}
		<div class="alert alert-warning">{{ message }}</div>
	{% endif %}
	<div class="form-group">
		<label for="name">Name:</label>
		<input type="text" class="form-control" id="name" name="name" placeholder="Enter name">
		<input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
	</div>
	<div class="form-group">
		<label for="url">link:</label>
		<input type="url" class="form-control" id="url" name="url" placeholder="Enter link">
	</div>
	<div class="form-group">
		<label for="start-date">Start Date:</label>
		<input type="date" class="form-control" id="start-date" name="start_dateTime" placeholder="Enter Date">
	</div>
	<div class="form-group">
		<label for="end-date">End Date:</label>
		<input type="date" class="form-control" id="end-date" name="end_dateTime" placeholder="Enter Date">
	</div>
	<div class="form-group">
		<label for="frequency">Frequency:</label>
		<input type="number" class="form-control" id="frequency" name="frequency" placeholder="Enter frequency">
	</div>
	<div class="form-group">
		<label for="recursive">Recursive:</label>
		<input class="form-control" id="recursive" name="recursive" placeholder="yes/no">
	</div>

	<button type="submit" class="btn btn-primary">Submit</button>
</form>
{% endblock %}
