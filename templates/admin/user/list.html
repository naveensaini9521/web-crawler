{% extends "admin/layout.html" %}
{% block content %}
<div class="pagetitle">
      <h1>User Create</h1>
      <nav>
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="/dashboard">Home</a></li>
          <li class="breadcrumb-item">User</li>
          <li class="breadcrumb-item active">List</li>
       </ol>
        <a style="position: absolute;top: 100px;right: 50px;" href="/user/create"><button class="btn btn-primary">Create</button></a>
      </nav>
    </div><!-- End Page Title -->
    <section class="section">
      <div class="row">
        <div class="col-lg-12">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">User List</h5>
              <table class="table table-stripped">
                <thead class="thead-dark">
                 <tr>
                    <td>
                  Username
                </td>
                <td>
                  Email
                </td>
                     <td>
                         Password
                     </td>
                 </tr>
                </thead>
                <tbody>
                {% for user in data %}
               <tr>
                 <td>{{ user.username }}</td>
                  <td>{{ user.email }}</td>
                   <td>{{user.password }}</td>
               </tr>
              {% endfor %}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </section>
{% endblock %}
